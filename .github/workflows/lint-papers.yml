name: Papers matrix lint

on:
  pull_request:
    paths:
      - Papers.md
      - Software.md
      - Databases.md
      - OtherResources.md
      - Datasets/**
      - CONTRIBUTING.md
      - CLAUDE.md
      - site/scripts/parser/**
      - site/scripts/db/**
      - site/db/**
  push:
    branches:
      - main
    paths:
      - Papers.md
      - Software.md
      - Databases.md
      - OtherResources.md
      - Datasets/**
      - CONTRIBUTING.md
      - CLAUDE.md
      - site/scripts/parser/**
      - site/scripts/db/**
      - site/db/**
  workflow_dispatch:

concurrency:
  group: lint-papers-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint Papers.md matrix ↔ references
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm --dir site install --frozen-lockfile

      - name: Run Papers.md lint
        run: pnpm --dir site lint:papers

      - name: DB integrity + round-trip verify
        run: |
          pnpm --dir site db:check
          pnpm --dir site db:verify

      - name: DB ↔ Markdown sync guard
        run: |
          pnpm --dir site db:emit
          git diff --exit-code -- Papers.md Software.md Databases.md 'Datasets/*.md' \
            || { echo "::error::Committed Markdown is out of sync with the DB. Run 'pnpm --dir site db:emit' and commit the result."; exit 1; }
