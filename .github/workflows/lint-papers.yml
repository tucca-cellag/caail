name: Papers matrix lint

on:
  pull_request:
    paths:
      - Papers.md
      - Software.md
      - Databases.md
      - OtherResources.md
      - Datasets/**
  push:
    branches:
      - main
    paths:
      - Papers.md
      - Software.md
      - Databases.md
      - OtherResources.md
      - Datasets/**
  workflow_dispatch:

concurrency:
  group: lint-papers-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint Papers.md matrix ↔ references
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm --dir site install --frozen-lockfile

      - name: Run Papers.md lint
        run: pnpm --dir site lint:papers
