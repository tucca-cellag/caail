name: Suggest software, dataset, or other resource
description: Suggest open-source software (Software.md), a dataset (Datasets/), a database (Databases.md), or a video/course/podcast (OtherResources.md).
title: "[Resource] <Name>"
labels: ["suggestion", "resources"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for anything that isn't a peer-reviewed paper. For papers, please use the "Suggest a paper" template instead.

  - type: dropdown
    id: resource_type
    attributes:
      label: Resource type
      description: Which file would this be added to?
      options:
        - Software (Software.md)
        - Dataset (Datasets/)
        - Database (Databases.md)
        - Video, course, podcast, or other educational material (OtherResources.md)
    validations:
      required: true

  - type: input
    id: name
    attributes:
      label: Name / title
      placeholder: e.g. AlphaFold, NIH GenBank, "Webinar 5 - Scaling cellular agriculture"
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: Canonical URL
      description: For software, the GitHub repo or project home. For datasets, the dataset's landing page. For databases, the database's canonical home page. For videos, the source URL.
      placeholder: https://...
    validations:
      required: true

  - type: input
    id: category
    attributes:
      label: Suggested category / section
      description: Which `## section` heading (or, for a dataset, which `Datasets/` species page) does this fit under? Check the relevant file (Software.md, the Datasets/ directory, Databases.md, OtherResources.md) for current sections. If you think a new section is needed, write the proposed name.
      placeholder: e.g. Media Optimization & Cell Line Engineering / Datasets/Cow.md / Sequence, Genome & Expression Repositories / YouTube Videos
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One to three sentences describing what the resource is and — importantly — how it applies to cellular agriculture. This is the body text that will appear in the entry.
      placeholder: |
        Summary: Predicts the 3D structure of proteins from their amino acid sequence using deep learning. Can be used for design and engineering of cost-effective recombinant growth factors and signaling molecules...
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional notes (optional)
      description: Anything else a maintainer should know — related papers in the repo, licensing concerns, etc.

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I've searched the relevant file (Software.md, the Datasets/ directory, Databases.md, or OtherResources.md) and this resource isn't already listed.
          required: true
        - label: The link is to the canonical source (not a mirror or third-party summary).
          required: true
        - label: I understand that contributions to this repository are licensed under CC BY 4.0.
          required: true
